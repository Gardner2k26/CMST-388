 <!DOCTYPE html> <!-- This tells the browser this is an HTML5 page. -->
<html lang="en"> <!-- This starts the HTML page. -->
<head> <!-- This starts the head section. -->
  <meta charset="UTF-8"> <!-- This sets the character format. -->
  <title>Registration Form</title> <!-- This sets the browser tab title. -->
</head> <!-- This ends the head section. -->

<body> <!-- This starts the visible page. -->

  <h1>Registration Form</h1> <!-- This displays the form title. -->

  <div id="errors" style="color:red;"></div> <!-- This shows error messages. -->

  <form id="form" action="mailto:YOUR_EMAIL_HERE" method="post" enctype="text/plain"> <!-- This creates the form and sends it by email. -->

    <p>First Name: <input type="text" id="firstName" name="First Name" value="First Name" onfocus="clearText(this, 'First Name')"></p> <!-- This creates the first name box. -->

    <p>Last Name: <input type="text" id="lastName" name="Last Name" value="Last Name" onfocus="clearText(this, 'Last Name')"></p> <!-- This creates the last name box. -->

    <p>Address: <input type="text" id="address" name="Address"></p> <!-- This creates the address box. -->

    <p>City: <input type="text" id="city" name="City"></p> <!-- This creates the city box. -->

    <p>State:
      <select id="state" name="State"> <!-- This creates the state dropdown. -->
        <option value="">Select State</option> <!-- This creates the blank state option. -->
        <option value="GA">Georgia</option> <!-- This creates the Georgia option. -->
        <option value="MD">Maryland</option> <!-- This creates the Maryland option. -->
        <option value="VA">Virginia</option> <!-- This creates the Virginia option. -->
        <option value="FL">Florida</option> <!-- This creates the Florida option. -->
        <option value="NC">North Carolina</option> <!-- This creates the North Carolina option. -->
      </select> <!-- This ends the dropdown. -->
    </p> <!-- This ends the state line. -->

    <p>Zip Code: <input type="text" id="zip" name="Zip Code" maxlength="5"></p> <!-- This creates the zip code box. -->

    <p>Area Code: <input type="text" id="areaCode" name="Area Code" maxlength="3"></p> <!-- This creates the area code box. -->

    <p>Phone Number: <input type="text" id="phone" name="Phone Number" maxlength="7"></p> <!-- This creates the phone number box. -->

    <p>Email: <input type="text" id="email" name="Email"></p> <!-- This creates the email box. -->

    <p>Confirm Email: <input type="text" id="confirmEmail" name="Confirm Email"></p> <!-- This creates the confirm email box. -->

    <p>Meal Preference:<br> <!-- This starts the meal section. -->
      <input type="radio" name="meal" value="Vegan"> Vegan<br> <!-- This creates the Vegan choice. -->
      <input type="radio" name="meal" value="Vegetarian"> Vegetarian<br> <!-- This creates the Vegetarian choice. -->
      <input type="radio" name="meal" value="Non-Vegetarian"> Non-Vegetarian <!-- This creates the Non-Vegetarian choice. -->
    </p> <!-- This ends the meal section. -->

    <p>Contact Method:<br> <!-- This starts the contact method section. -->
      <input type="checkbox" name="contact" value="Email"> Email<br> <!-- This creates the Email checkbox. -->
      <input type="checkbox" name="contact" value="Phone"> Phone<br> <!-- This creates the Phone checkbox. -->
      <input type="checkbox" name="contact" value="Text"> Text<br> <!-- This creates the Text checkbox. -->
      <input type="checkbox" name="contact" value="Mail"> Mail <!-- This creates the Mail checkbox. -->
    </p> <!-- This ends the contact method section. -->

    <p>Comments:<br><textarea id="comments" name="Comments" maxlength="250"></textarea></p> <!-- This creates the optional comment box. -->

    <button type="button" onclick="submitForm()">Submit</button> <!-- This button checks and submits the form. -->

    <button type="button" onclick="resetForm()">Reset</button> <!-- This button clears the form. -->

  </form> <!-- This ends the form. -->

  <script src="script.js"></script> <!-- This connects the JavaScript file. -->

</body> <!-- This ends the visible page. -->
</html> <!-- This ends the HTML page. -->
